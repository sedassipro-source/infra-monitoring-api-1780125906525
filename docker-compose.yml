version: "3.9"

services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/infra-monitoring-api-1780125906525

    depends_on:
      - db


  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: infra-monitoring-api-1780125906525
    volumes:
      - pgdata:/var/lib/postgresql/data




volumes:
  pgdata:
